services:

  # ─── Flask Application ───────────────────────
  flask:
    build: .
    command:
      - gunicorn
      - -w
      - "1"
      - --threads
      - "8"
      - --timeout
      - "300"
      - -b
      - 0.0.0.0:5000
      - app:app

    container_name: cloudmon-flask
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database
    environment:
      - SECRET_KEY=cloudmon-docker-secret-2024
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - cloudmon-net

  # ─── Prometheus ──────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudmon-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - cloudmon-net

  # ─── Grafana ─────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cloudmon-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - cloudmon-net

  # ─── Node Exporter ───────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: cloudmon-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - cloudmon-net

# ─── Persistent Volumes ──────────────────────
volumes:
  prometheus-data:
  grafana-data:

# ─── Network ─────────────────────────────────
networks:
  cloudmon-net:
    driver: bridge
